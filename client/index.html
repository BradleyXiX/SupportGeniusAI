<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SupportGenius AI - Intelligent Customer Support Assistant">
  <title>SupportGenius AI</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="avatar">
        <span>SG</span>
      </div>
      <div>
        <h1>SupportGenius AI</h1>
        <p class="status">Online &bull; Ready to help</p>
      </div>
    </header>
    
    <div id="chat-messages" class="chat-messages">
      <div class="message ai-message">
        <div class="bubble">Hello! I'm SupportGenius. I can help answer questions about our company, check your order status, or update your address. How can I assist you today?</div>
      </div>
    </div>
    
    <div class="chat-input-area">
      <input type="text" id="input" placeholder="Type your message..." onkeypress="handleKeyPress(event)" autocomplete="off" />
      <button onclick="send()" id="send-btn" aria-label="Send Message">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
